<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BAE Payments+ | Environment Router</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="bg-gray-50 font-sans" x-data="cartSystem()">
    <nav
      class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50 shadow-sm"
    >
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-4">
          <h1 class="text-xl font-bold text-gray-800 italic">Payments+</h1>
          <div
            @click="environment = environment === 'prod' ? 'dev' : 'prod'"
            class="flex items-center bg-gray-200 rounded-full p-1 cursor-pointer w-32 relative h-8 select-none"
          >
            <div
              class="w-1/2 text-center z-10 text-[10px] font-bold tracking-widest transition-colors duration-300"
              :class="environment === 'prod' ? 'text-white' : 'text-gray-500'"
            >
              PROD
            </div>
            <div
              class="w-1/2 text-center z-10 text-[10px] font-bold tracking-widest transition-colors duration-300"
              :class="environment === 'dev' ? 'text-white' : 'text-gray-500'"
            >
              DEV
            </div>
            <div
              class="absolute top-1 bottom-1 w-[46%] rounded-full transition-all duration-300 shadow"
              :class="environment === 'prod' ? 'left-1 bg-green-500' : 'left-[50%] bg-blue-600'"
            ></div>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button
            @click="step = 'shop'"
            class="text-sm text-gray-500 hover:text-black"
          >
            Shop
          </button>
          <div class="bg-gray-100 px-3 py-1 rounded-full text-sm font-bold">
            Cart (<span x-text="cart.length"></span>)
          </div>
        </div>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto py-10 px-6">
      <div x-show="step === 'shop'" class="animate-in fade-in duration-500">
        <h2 class="text-2xl font-bold mb-8 text-gray-800">Select Services</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <template x-for="product in products" :key="product.id">
            <div
              class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between hover:shadow-md transition"
            >
              <div>
                <div
                  class="w-12 h-12 bg-blue-50 text-blue-600 rounded-lg mb-4 flex items-center justify-center font-bold"
                >
                  JOD
                </div>
                <h3
                  class="font-bold text-lg text-gray-900"
                  x-text="product.name"
                ></h3>
                <p class="text-gray-500 text-sm mt-2" x-text="product.desc"></p>
              </div>
              <div class="mt-8 flex justify-between items-center">
                <span
                  class="font-black text-xl text-gray-900"
                  x-text="product.price.toFixed(2)"
                ></span>
                <button
                  @click="addToCart(product)"
                  class="bg-black text-white px-6 py-2 rounded-xl text-sm font-bold hover:bg-gray-800 active:scale-95 transition"
                >
                  Add
                </button>
              </div>
            </div>
          </template>
        </div>

        <div
          x-show="cart.length > 0"
          class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white shadow-2xl border border-gray-200 px-8 py-5 rounded-3xl flex items-center gap-10"
        >
          <div>
            <p
              class="text-xs text-gray-400 uppercase font-bold tracking-widest"
            >
              Total Amount
            </p>
            <span
              class="font-black text-2xl text-black"
              x-text="total.toFixed(2) + ' JOD'"
            ></span>
          </div>
          <button
            @click="initiateCheckout()"
            class="bg-blue-600 text-white px-10 py-3 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition"
          >
            Checkout Now
          </button>
        </div>
      </div>

      <div
        x-show="step === 'checkout'"
        class="max-w-xl mx-auto animate-in slide-in-from-bottom-4 duration-500"
        style="display: none"
      >
        <button
          @click="step = 'shop'; cart = []; total = 0;"
          class="text-gray-400 mb-6 flex items-center gap-2 hover:text-black transition"
        >
          ← Reset & Return to Shop
        </button>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
          <div class="flex items-center gap-3 mb-2">
            <h2 class="text-2xl font-black">Secure Checkout</h2>
            <span
              class="text-[10px] font-bold px-2 py-1 rounded tracking-widest text-white"
              :class="environment === 'prod' ? 'bg-green-500' : 'bg-blue-600'"
              x-text="environment.toUpperCase()"
            ></span>
          </div>
          <div class="flex justify-between items-center mb-8 border-b pb-4">
            <span class="text-gray-500">Amount Due:</span>
            <span
              class="text-xl font-bold text-blue-600"
              x-text="total.toFixed(2) + ' JOD'"
            ></span>
          </div>

          <div
            id="checkout-ui-wrapper"
            class="relative min-h-[400px] border border-gray-200 rounded-2xl bg-gray-50 overflow-hidden flex flex-col items-center justify-center"
          >
            <div
              x-show="loading"
              class="absolute inset-0 flex flex-col items-center justify-center bg-white/90 z-10"
            >
              <div
                class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"
              ></div>
              <p
                class="mt-4 text-sm font-bold text-gray-600"
                x-text="loadingMessage"
              ></p>
            </div>
            <div id="payment-selection-container" class="w-full p-2"></div>
            <div id="payment-screen-container" class="w-full p-2"></div>
          </div>
        </div>
      </div>
    </main>

    <script>
      function cartSystem() {
        return {
          step: "shop",
          environment: "prod", // Defaults to Production
          loading: false,
          loadingMessage: "Initializing...",
          products: [
            {
              id: 1,
              name: "Basic Plan",
              price: 0.1,
              desc: "Entry level tier.",
            },
            {
              id: 2,
              name: "Standard Plan",
              price: 0.2,
              desc: "Most popular tier.",
            },
            {
              id: 3,
              name: "Premium Plan",
              price: 0.3,
              desc: "The highest tier test.",
            },
          ],
          cart: [],
          total: 0,

          addToCart(product) {
            this.cart.push(product);
            this.total = this.cart.reduce((sum, item) => sum + item.price, 0);
          },

          async initiateCheckout() {
            this.step = "checkout";
            this.loading = true;
            this.loadingMessage = `Connecting to Proxy (${this.environment.toUpperCase()})...`;
            document.getElementById("payment-selection-container").innerHTML =
              "";
            document.getElementById("payment-screen-container").innerHTML = "";

            try {
              // ---> INJECT ENVIRONMENT FLAG HERE <---
              const payload = JSON.stringify({
                totalAmount: this.total.toFixed(2),
                origin: window.location.origin,
                environment: this.environment,
              });

              const response = await fetch(
                "https://bae-api-proxy.z-kulaghsi.workers.dev",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: payload,
                },
              );

              const rawText = await response.text();

              console.log("🔥 RAW BACKEND RESPONSE:", rawText);

              if (!response.ok) {
                throw new Error(
                  `Proxy Request Failed (Status: ${response.status})\n\nResponse: ${rawText}`,
                );
              }

              this.loadingMessage = "Token received. Downloading SDK...";

              let captureContextToken;
              try {
                const parsedData = JSON.parse(rawText);
                if (typeof parsedData === "string") {
                  captureContextToken = parsedData;
                } else if (parsedData && parsedData.token) {
                  captureContextToken = parsedData.token;
                } else {
                  throw new Error("Unexpected API format: " + rawText);
                }
              } catch (e) {
                if (!captureContextToken) {
                  captureContextToken = rawText.replace(/^"|"$/g, "").trim();
                }
              }

              const decodedPayload = JSON.parse(
                atob(captureContextToken.split(".")[1]),
              );

              console.log("🔥 --- TOKEN DEBUG INFO --- 🔥");
              console.log(`Environment: ${this.environment.toUpperCase()}`);
              console.log(
                "Bank's Allowed Payments:",
                decodedPayload.ctx[0].data.allowedPaymentTypes,
              );
              console.log("🔥 ------------------------ 🔥");

              const sdkUrl = decodedPayload.ctx[0].data.clientLibrary;
              const sdkIntegrity =
                decodedPayload.ctx[0].data.clientLibraryIntegrity || null;

              const existing = document.querySelector(
                'script[data-cybersource-sdk="true"]',
              );
              if (existing) existing.remove();
              delete window.Accept;
              delete window.VAS;
              delete window.CyberSource;

              await new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = sdkUrl;
                script.async = true;
                script.type = "text/javascript";
                script.setAttribute("data-cybersource-sdk", "true");

                if (sdkIntegrity) {
                  script.integrity = sdkIntegrity;
                  script.crossOrigin = "anonymous";
                }

                script.onload = () => setTimeout(resolve, 200);
                script.onerror = () =>
                  reject(new Error("Failed to load CyberSource SDK"));
                document.body.appendChild(script);
              });

              this.loadingMessage = "Rendering secure fields...";

              try {
                if (!window.Accept)
                  throw new Error("Accept SDK unavailable after load");

                const accept = await Accept(captureContextToken);
                const up = await accept.unifiedPayments();

                this.loading = false;

                const transientToken = await up.show({
                  containers: {
                    paymentSelection: "#payment-selection-container",
                  },
                });

                if (!transientToken)
                  throw new Error("No transient token returned from show()");

                this.loading = true;
                this.loadingMessage = "Completing authentication...";

                const completeResult = await up.complete(transientToken);

                let decodedResult = {};
                try {
                  if (
                    typeof completeResult === "string" &&
                    completeResult.includes(".")
                  ) {
                    decodedResult = JSON.parse(
                      atob(completeResult.split(".")[1]),
                    );
                  }
                } catch (e) {
                  console.warn("Could not decode completeResult as JWT", e);
                }

                if (
                  decodedResult.status === "AUTHORIZED" ||
                  decodedResult.outcome === "AUTHORIZED"
                ) {
                  this.loading = false;
                  document.getElementById(
                    "payment-selection-container",
                  ).innerHTML = "";

                  if (window.ReactNativeWebView) {
                    window.ReactNativeWebView.postMessage(
                      JSON.stringify({ event: "payment_success" }),
                    );
                  }

                  document.getElementById(
                    "payment-screen-container",
                  ).innerHTML = `
                      <div class="text-center py-10 animate-in zoom-in duration-500">
                        <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg shadow-green-200">✓</div>
                        <h3 class="text-2xl font-black text-gray-900">Payment Successful!</h3>
                        <p class="text-gray-500 mt-2 font-medium">Auto-Authorized securely via CyberSource (${this.environment.toUpperCase()}).</p>
                        <button onclick="window.location.reload()" class="mt-8 text-blue-600 font-bold hover:underline">Start New Test</button>
                      </div>
                    `;
                  return;
                }

                this.loadingMessage = "Processing final payment...";
                document.getElementById(
                  "payment-selection-container",
                ).innerHTML = "";

                // ---> INJECT ENVIRONMENT FLAG HERE <---
                const finalChargeResponse = await fetch(
                  "https://bae-api-proxy.z-kulaghsi.workers.dev/process-payment",
                  {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      transientToken: completeResult,
                      environment: this.environment,
                    }),
                  },
                );

                const chargeResultRaw = await finalChargeResponse.text();

                if (!finalChargeResponse.ok) {
                  throw new Error(`Charge Failed: ${chargeResultRaw}`);
                }

                this.loading = false;

                if (window.ReactNativeWebView) {
                  window.ReactNativeWebView.postMessage(
                    JSON.stringify({ event: "payment_success" }),
                  );
                }

                document.getElementById("payment-screen-container").innerHTML =
                  `
                  <div class="text-center py-10 animate-in zoom-in duration-500">
                    <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg shadow-green-200">✓</div>
                    <h3 class="text-2xl font-black text-gray-900">Payment Successful!</h3>
                    <p class="text-gray-500 mt-2 font-medium">Your ${this.environment.toUpperCase()} transaction has been processed securely.</p>
                    <button onclick="window.location.reload()" class="mt-8 text-blue-600 font-bold hover:underline">Start New Test</button>
                  </div>
                `;
              } catch (renderError) {
                console.error("Payment Process Error:", renderError);
                alert("Error processing payment:\n\n" + renderError.message);
                this.loading = false;
              }
            } catch (error) {
              console.error("Integration Error:", error);
              alert("Checkout Error:\n\n" + error.message);
              this.loading = false;
            }
          },
        };
      }
    </script>
  </body>
</html>
